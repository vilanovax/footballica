<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>فوتبالیکا — صفحهٔ سؤال</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;800;900&display=swap');
:root{--pitch-deep:#07160F;--chalk:#EAF2EC;--chalk-dim:#9DB4A6;--leather:#F4EFE4;--leather-sh:#D6CCB7;--ink:#0A1A12;--amber:#FFC23C;--correct:#3DD66E;--wrong:#F0413E}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Vazirmatn',sans-serif;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%,#123a24 0%,#07160F 55%,#04100A 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px 12px;gap:16px}
.phone{width:390px;max-width:100%;height:800px;border-radius:42px;background:var(--pitch-deep);position:relative;overflow:hidden;box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 0 10px #0c0c0e,0 0 0 12px #1c1c1f;isolation:isolate}
.phone.shake{animation:quake .5s}
@keyframes quake{0%,100%{transform:translate(0,0)}15%{transform:translate(-6px,4px)}30%{transform:translate(7px,-3px)}45%{transform:translate(-5px,-4px)}60%{transform:translate(5px,3px)}75%{transform:translate(-3px,2px)}}
.pitch-bg{position:absolute;inset:0;z-index:0;overflow:hidden}
.pitch-bg::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(115deg,rgba(20,98,47,.55) 0 46px,rgba(14,77,42,.55) 46px 92px);transform:scale(1.4)}
.pitch-bg::after{content:"";position:absolute;inset:0;background:radial-gradient(520px 360px at 50% 8%,rgba(255,224,150,.22),transparent 70%),radial-gradient(900px 900px at 50% 120%,rgba(0,0,0,.65),transparent 60%)}
.danger-edge{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0;box-shadow:inset 0 0 90px 18px rgba(240,65,62,.7)}
.danger-edge.on{animation:edgepulse .7s infinite}
@keyframes edgepulse{0%,100%{opacity:.25}50%{opacity:.7}}
.modesw{position:relative;z-index:3;display:flex;justify-content:center;gap:6px;padding:14px 0 2px}
.modesw button{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.12);color:var(--chalk-dim);font-family:inherit;font-weight:800;font-size:12px;padding:7px 16px;border-radius:11px;cursor:pointer}
.modesw button.active{background:var(--amber);color:#3a2400;border-color:var(--amber)}
.top{position:relative;z-index:2;padding:10px 18px 6px;display:flex;align-items:center;justify-content:space-between}
.player{display:flex;align-items:center;gap:9px}.player.you{flex-direction:row-reverse}
.ava{width:40px;height:40px;border-radius:13px;display:grid;place-items:center;font-weight:900;font-size:14px;color:#fff;box-shadow:0 4px 0 rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.25)}
.ava.red{background:linear-gradient(160deg,#ff5a5a,#c1272d)}.ava.blue{background:linear-gradient(160deg,#3aa0ff,#1450c4)}
.pname{font-size:11.5px;color:var(--chalk);font-weight:700;line-height:1.1}
.pscore{font-size:17px;color:#fff;font-weight:900;line-height:1.1;transition:color .3s}
.you .pname,.you .pscore{text-align:left}
.vs{font-weight:900;color:var(--amber);font-size:12px;letter-spacing:1px;background:rgba(0,0,0,.3);padding:5px 10px;border-radius:10px;border:1px solid rgba(255,194,60,.4)}
.rounds{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:4px}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.18)}
.dot.done{background:var(--correct)}.dot.miss{background:var(--wrong)}
.dot.now{background:var(--amber);box-shadow:0 0 10px var(--amber);transform:scale(1.3)}
.round-label{color:var(--chalk-dim);font-size:11px;font-weight:600;margin-right:8px}
.timer-wrap{position:relative;z-index:2;display:grid;place-items:center;margin-top:10px;height:140px}
.ring{transform:rotate(-90deg);position:absolute}
.ring .track{fill:none;stroke:rgba(0,0,0,.45);stroke-width:9}
.ring .prog{fill:none;stroke:var(--amber);stroke-width:9;stroke-linecap:round;filter:drop-shadow(0 0 6px var(--amber))}
.timer-num{position:absolute;font-weight:900;font-size:44px;color:#fff;font-variant-numeric:tabular-nums;text-shadow:0 0 14px rgba(255,194,60,.5);transition:color .2s,transform .15s}
.timer-num.warn{color:var(--amber)}.timer-num.danger{color:var(--wrong);animation:beat .6s infinite}
@keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}
.bomb{position:absolute;display:none;flex-direction:column;align-items:center}.bomb.show{display:flex}
.bomb-body{width:96px;height:96px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#3a3f44,#15181b 70%);position:relative;display:grid;place-items:center;box-shadow:0 8px 24px rgba(0,0,0,.6),inset -6px -8px 14px rgba(0,0,0,.7),inset 6px 6px 12px rgba(255,255,255,.12)}
.bomb-body::before{content:"";position:absolute;top:14%;left:24%;width:22px;height:14px;border-radius:50%;background:rgba(255,255,255,.18);filter:blur(2px)}
.bomb-num{font-weight:900;font-size:38px;color:#fff;font-variant-numeric:tabular-nums;text-shadow:0 1px 4px #000;z-index:2}
.fuse{position:absolute;top:-26px;width:6px;height:30px;background:linear-gradient(#5b4632,#3a2c1e);border-radius:3px;transform-origin:bottom}
.spark{position:absolute;top:-32px;width:16px;height:16px;border-radius:50%;background:radial-gradient(circle,#fff,#ffd23c 40%,#ff6a00 70%,transparent);animation:spark .25s infinite alternate}
@keyframes spark{from{transform:scale(.8);opacity:.8}to{transform:scale(1.3);opacity:1}}
.bomb.tense .bomb-body{animation:bshake .25s infinite}
@keyframes bshake{0%,100%{transform:translate(0,0)}25%{transform:translate(-2px,1px)}75%{transform:translate(2px,-1px)}}
.fireball{position:absolute;z-index:9;width:30px;height:30px;border-radius:50%;opacity:0;background:radial-gradient(circle,#fff,#ffd23c 30%,#ff6a00 55%,#c1272d 75%,transparent);pointer-events:none}
.fireball.go{animation:blast .55s forwards}
@keyframes blast{0%{opacity:1;transform:scale(.2)}60%{opacity:1;transform:scale(8)}100%{opacity:0;transform:scale(11)}}
.scorepop{position:absolute;left:50%;top:175px;transform:translateX(-50%);z-index:6;font-weight:900;font-size:28px;opacity:0;pointer-events:none;text-shadow:0 2px 12px rgba(0,0,0,.7)}
.scorepop.show{animation:rise 1.1s forwards}
@keyframes rise{0%{opacity:0;transform:translate(-50%,10px)}18%{opacity:1}100%{opacity:0;transform:translate(-50%,-46px)}}
.qcard{position:relative;z-index:2;margin:6px 16px 0;background:linear-gradient(180deg,var(--leather),#ebe4d4);border-radius:18px;padding:16px 16px;box-shadow:0 9px 0 var(--leather-sh),0 16px 28px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.7);border:1px solid rgba(0,0,0,.06)}
.qtag{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:800;color:#0d6b34;background:rgba(61,214,110,.16);padding:4px 9px;border-radius:8px;margin-bottom:9px}
.qtag.bomb-tag{color:#9c1f1c;background:rgba(240,65,62,.14)}
.qtext{color:var(--ink);font-weight:800;font-size:16.5px;line-height:1.65}
.answers{position:relative;z-index:2;display:flex;flex-direction:column;gap:9px;padding:12px 16px 0}
.ans{background:linear-gradient(180deg,#1d6e3a,#155029);color:#fff;font-weight:800;font-size:15px;border:none;border-radius:14px;padding:14px 14px;display:flex;align-items:center;gap:11px;text-align:right;cursor:pointer;width:100%;box-shadow:0 5px 0 #0c3a1d,inset 0 1px 0 rgba(255,255,255,.18);transition:transform .08s,box-shadow .08s,background .25s,opacity .25s}
.ans .k{flex:none;width:24px;height:24px;border-radius:7px;background:rgba(0,0,0,.28);display:grid;place-items:center;font-size:12px;font-weight:900;color:var(--amber)}
.ans .lbl{flex:1}
.ans:active{transform:translateY(4px);box-shadow:0 1px 0 #0c3a1d}
.ans.correct{background:linear-gradient(180deg,#33c866,#1f9f4d);box-shadow:0 5px 0 #127a37;animation:pop .35s}
.ans.wrong{background:linear-gradient(180deg,#f0413e,#c52826);box-shadow:0 5px 0 #8c1816;animation:shake .4s}
.ans.dim{opacity:.3;filter:grayscale(.5)}
.ans.boom{animation:boomout .5s forwards}
.ans .tick{margin-right:auto;font-weight:900;opacity:0}
.ans.correct .tick,.ans.wrong .tick{opacity:1}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.04)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes boomout{0%{transform:scale(1)}30%{transform:scale(1.08);filter:brightness(2.2)}100%{transform:scale(0);opacity:0}}
.powers{position:absolute;left:0;right:0;bottom:0;z-index:3;display:flex;justify-content:center;gap:11px;padding:14px 16px 22px;background:linear-gradient(0deg,rgba(4,12,8,.94),transparent)}
.pw{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:15px;padding:10px 4px;width:92px;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--chalk);cursor:pointer;transition:transform .08s;position:relative}
.pw:active{transform:scale(.94)}.pw .ic{font-size:19px}.pw .lbl{font-size:10.5px;font-weight:700}
.pw .cnt{position:absolute;top:-6px;left:-6px;background:var(--amber);color:#3a2400;font-size:10px;font-weight:900;width:18px;height:18px;border-radius:50%;display:grid;place-items:center;box-shadow:0 2px 5px rgba(0,0,0,.4)}
.pw.used{opacity:.3;pointer-events:none}.pw.bomb{border-color:rgba(240,65,62,.5)}.pw.bomb .ic{filter:drop-shadow(0 0 6px rgba(240,65,62,.7))}
.flash{position:absolute;inset:0;z-index:8;background:#fff;opacity:0;pointer-events:none}.flash.go{animation:fl .3s}
@keyframes fl{0%{opacity:.85}100%{opacity:0}}
.cap{color:var(--chalk-dim);font-size:12px;text-align:center;max-width:390px;line-height:1.8}.cap b{color:var(--amber)}
.reset{background:var(--amber);color:#3a2400;border:none;border-radius:12px;padding:10px 22px;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit}.reset:active{transform:translateY(2px)}
</style>
</head>
<body>
<div class="phone" id="phone">
  <div class="pitch-bg"></div>
  <div class="danger-edge" id="edge"></div>
  <div class="flash" id="flash"></div>
  <div class="modesw">
    <button id="mNormal" class="active" onclick="setMode('normal')">حالت عادی</button>
    <button id="mBomb" onclick="setMode('bomb')">💣 حالت بمب</button>
  </div>
  <div class="top">
    <div class="player"><div class="ava red">ر.م</div><div><div class="pname">رضا حریف</div><div class="pscore" id="oppScore">۲۰۰</div></div></div>
    <div class="vs">VS</div>
    <div class="player you"><div class="ava blue">تو</div><div><div class="pname">شما</div><div class="pscore" id="meScore">۳۰۰</div></div></div>
  </div>
  <div class="rounds"><span class="round-label">سؤال ۳ از ۵</span><span class="dot done"></span><span class="dot miss"></span><span class="dot now"></span><span class="dot"></span><span class="dot"></span></div>
  <div class="timer-wrap">
    <svg class="ring" id="ringSvg" width="132" height="132"><circle class="track" cx="66" cy="66" r="56"></circle><circle class="prog" id="prog" cx="66" cy="66" r="56"></circle></svg>
    <div class="timer-num" id="tnum">۱۵</div>
    <div class="bomb" id="bomb"><div class="fuse" id="fuse"><div class="spark"></div></div><div class="bomb-body"><span class="bomb-num" id="bnum">۸</span></div></div>
    <div class="fireball" id="fireball"></div>
  </div>
  <div class="scorepop" id="scorepop">+۱۰۰</div>
  <div class="qcard">
    <span class="qtag" id="qtag">⚽ لیگ برتر · سخت</span>
    <div class="qtext" id="qtext">کدام بازیکن در فصل ۲۰۲۲ آقای گلِ لیگ قهرمانان اروپا شد؟</div>
  </div>
  <div class="answers" id="answers">
    <button class="ans" data-i="0"><span class="k">۱</span><span class="lbl">کریم بنزما</span><span class="tick">✓</span></button>
    <button class="ans" data-i="1"><span class="k">۲</span><span class="lbl">ارلینگ هالند</span><span class="tick">✓</span></button>
    <button class="ans" data-i="2"><span class="k">۳</span><span class="lbl">محمد صلاح</span><span class="tick">✓</span></button>
    <button class="ans" data-i="3"><span class="k">۴</span><span class="lbl">کیلیان امباپه</span><span class="tick">✓</span></button>
  </div>
  <div class="powers">
    <div class="pw" id="pw5050"><span class="cnt">۱</span><span class="ic">✂️</span><span class="lbl">نصف‌نصف</span></div>
    <div class="pw" id="pwTime"><span class="cnt">۱</span><span class="ic">⏱️</span><span class="lbl">زمان اضافه</span></div>
    <div class="pw bomb" id="pwBomb"><span class="cnt">۲</span><span class="ic">💣</span><span class="lbl">بمب</span></div>
  </div>
</div>
<p class="cap" id="cap">حالت <b>عادی</b>: تایمر اسکوربوردی سبز→کهربایی→قرمز می‌شود.<br>یک گزینه را انتخاب کن یا روی <b>💣 حالت بمب</b> بزن.</p>
<button class="reset" onclick="resetGame()">سؤال بعدی ↻</button>
<script>
const fa=n=>String(n).replace(/\d/g,d=>'۰۱۲۳۴۵۶۷۸۹'[d]);
const C=2*Math.PI*56, CORRECT=0;
let mode='normal',TOTAL=15,t=TOTAL,raf,last,locked=false,bombLeft=2;
const prog=document.getElementById('prog'),tnum=document.getElementById('tnum'),ringSvg=document.getElementById('ringSvg'),bomb=document.getElementById('bomb'),bnum=document.getElementById('bnum'),fuse=document.getElementById('fuse'),edge=document.getElementById('edge'),phone=document.getElementById('phone'),fireball=document.getElementById('fireball'),flash=document.getElementById('flash'),qtag=document.getElementById('qtag');
prog.style.strokeDasharray=C;
function setMode(m){
  mode=m;cancelAnimationFrame(raf);
  document.getElementById('mNormal').classList.toggle('active',m==='normal');
  document.getElementById('mBomb').classList.toggle('active',m==='bomb');
  if(m==='bomb'){TOTAL=8;ringSvg.style.display='none';tnum.style.display='none';bomb.classList.add('show');qtag.className='qtag bomb-tag';qtag.textContent='💣 حالت بمب · فتیله روشن است!';document.getElementById('cap').innerHTML='حالت <b>بمب</b>: فتیله می‌سوزد. جواب درست = خنثی. غلط یا اتمام زمان = <b style="color:#F0413E">انفجار</b> و کم‌شدن امتیاز.';}
  else{TOTAL=15;ringSvg.style.display='';tnum.style.display='';bomb.classList.remove('show','tense');qtag.className='qtag';qtag.textContent='⚽ لیگ برتر · سخت';document.getElementById('cap').innerHTML='حالت <b>عادی</b>: تایمر اسکوربوردی سبز→کهربایی→قرمز می‌شود.<br>یک گزینه را انتخاب کن.';}
  resetGame();
}
function paint(){
  const r=t/TOTAL;
  if(mode==='normal'){prog.style.strokeDashoffset=C*(1-r);const c=r>.5?'#3DD66E':r>.25?'#FFC23C':'#F0413E';prog.style.stroke=c;prog.style.filter=`drop-shadow(0 0 6px ${c})`;tnum.textContent=fa(Math.ceil(t));tnum.className='timer-num'+(r<=.25?' danger':r<=.5?' warn':'');}
  else{bnum.textContent=fa(Math.ceil(t));fuse.style.height=(30*r)+'px';fuse.style.background=r>.4?'linear-gradient(#5b4632,#3a2c1e)':'linear-gradient(#ff7a1a,#c1272d)';if(r<=.4){bomb.classList.add('tense');edge.classList.add('on')}else{bomb.classList.remove('tense');edge.classList.remove('on')}}
}
function tick(now){if(!last)last=now;t-=(now-last)/1000;last=now;if(t<=0){t=0;paint();timeUp();return}paint();raf=requestAnimationFrame(tick)}
function start(){last=0;raf=requestAnimationFrame(tick)}
function explode(){flash.classList.remove('go');void flash.offsetWidth;flash.classList.add('go');fireball.classList.remove('go');void fireball.offsetWidth;fireball.classList.add('go');phone.classList.remove('shake');void phone.offsetWidth;phone.classList.add('shake');edge.classList.remove('on')}
function timeUp(){if(locked)return;locked=true;if(mode==='bomb'){explode();pop('−'+fa(150),'#F0413E');document.getElementById('meScore').textContent=fa(150);bomb.classList.add('boom')}document.querySelectorAll('.ans')[CORRECT].classList.add('correct')}
document.getElementById('answers').addEventListener('click',e=>{
  const btn=e.target.closest('.ans');if(!btn||locked||btn.classList.contains('dim'))return;
  locked=true;cancelAnimationFrame(raf);edge.classList.remove('on');
  const i=+btn.dataset.i;
  if(i===CORRECT){btn.classList.add('correct');if(mode==='bomb'){pop('خنثی شد! +'+fa(120),'#3DD66E');document.getElementById('meScore').textContent=fa(420)}else{pop('+'+fa(100),'#3DD66E');document.getElementById('meScore').textContent=fa(400)}}
  else{btn.classList.add('wrong');document.querySelectorAll('.ans')[CORRECT].classList.add('correct');if(mode==='bomb'){explode();pop('−'+fa(150),'#F0413E');document.getElementById('meScore').textContent=fa(150)}else pop('✗','#F0413E')}
});
function pop(txt,col){const p=document.getElementById('scorepop');p.textContent=txt;p.style.color=col;p.classList.remove('show');void p.offsetWidth;p.classList.add('show')}
document.getElementById('pw5050').addEventListener('click',function(){if(locked)return;this.classList.add('used');[...document.querySelectorAll('.ans')].filter(b=>+b.dataset.i!==CORRECT).sort(()=>Math.random()-.5).slice(0,2).forEach(b=>b.classList.add('dim'))});
document.getElementById('pwTime').addEventListener('click',function(){if(locked)return;this.classList.add('used');t=Math.min(TOTAL,t+(mode==='bomb'?3:5));paint();pop('+'+fa(mode==='bomb'?3:5)+' ثانیه','#FFC23C')});
document.getElementById('pwBomb').addEventListener('click',function(){if(locked)return;const live=[...document.querySelectorAll('.ans')].filter(b=>+b.dataset.i!==CORRECT&&!b.classList.contains('dim')&&!b.classList.contains('boom'));if(!live.length)return;const target=live[Math.floor(Math.random()*live.length)];flash.classList.remove('go');void flash.offsetWidth;flash.classList.add('go');target.classList.add('boom');bombLeft--;if(bombLeft<=0)this.classList.add('used');this.querySelector('.cnt').textContent=fa(Math.max(bombLeft,0))});
function resetGame(){locked=false;t=TOTAL;last=0;bombLeft=2;document.querySelectorAll('.ans').forEach(b=>b.className='ans');document.querySelectorAll('.pw').forEach(p=>p.classList.remove('used'));document.getElementById('pw5050').querySelector('.cnt').textContent=fa(1);document.getElementById('pwTime').querySelector('.cnt').textContent=fa(1);document.getElementById('pwBomb').querySelector('.cnt').textContent=fa(2);bomb.classList.remove('boom','tense');edge.classList.remove('on');paint();cancelAnimationFrame(raf);start()}
paint();start();
</script>
</body>
</html>
