# ============================================================
#  فوتبالیکا — سرویس‌های محلیِ توسعه (Postgres + Redis)
#  اجرا:  docker compose up -d
# ============================================================
services:
  postgres:
    image: postgres:16-alpine
    container_name: footballica-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: footballica
      POSTGRES_PASSWORD: footballica
      POSTGRES_DB: footballica
    ports:
      - "5432:5432"
    volumes:
      - footballica_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U footballica"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: footballica-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - footballica_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  footballica_pg:
  footballica_redis:
